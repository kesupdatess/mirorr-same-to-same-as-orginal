<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KES Updates - Donation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f8fafc 0%,#e0e7ff 100%);color:#0f172a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:12px}
.container{background:#fff;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,0.1);max-width:460px;width:100%;padding:28px 22px;animation:up .6s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.header{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #e2e8f0}
.header h1{font-size:24px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#059669,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#64748b;font-size:13px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:6px 14px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#059669;border-radius:20px;font-size:11px;font-weight:700;border:1px solid #a7f3d0;box-shadow:0 2px 8px rgba(5,150,105,.1)}
.fg{margin-bottom:16px}
.fg label{display:block;margin-bottom:7px;font-weight:600;font-size:13px;color:#1e293b}
.inp{width:100%;padding:13px 15px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:14px;font-family:inherit;background:#fafbfc;transition:.2s}
.inp:focus{outline:none;border-color:#2563eb;background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.08)}
textarea.inp{resize:vertical;min-height:65px}
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ab{padding:13px 6px;border:1.5px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.ab:active{transform:scale(.96)}
.ab.on{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-color:#1d4ed8;color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3);transform:translateY(-1px)}
.ab .a{font-size:14px;font-weight:700;display:block;margin-bottom:2px}
.ab .t{font-size:10px;font-weight:500;color:#64748b}
.ab.on .t{color:rgba(255,255,255,.95)}
.ab.cust{grid-column:span 3;background:linear-gradient(135deg,#f8fafc,#f1f5f9)}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.bp{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 6px 20px rgba(37,99,235,.3)}
.bp:hover{box-shadow:0 8px 25px rgba(37,99,235,.4);transform:translateY(-1px)}
.bs{background:linear-gradient(135deg,#059669,#047857);color:#fff;display:none;box-shadow:0 6px 20px rgba(5,150,105,.3)}
.bs:hover{box-shadow:0 8px 25px rgba(5,150,105,.4);transform:translateY(-1px)}
.qr{display:none;text-align:center;padding:22px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:16px;margin-bottom:16px;border:1.5px solid #bfdbfe}
.qr img{max-width:200px;border-radius:12px;background:#fff;padding:12px;margin:14px 0;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.qr h3{color:#1e40af;font-size:17px;margin-bottom:8px;font-weight:700}
.fl{position:relative;overflow:hidden;display:inline-block;width:100%;margin-top:16px}
.fl input[type=file]{position:absolute;left:-9999px}
.fl label{display:block;padding:18px;background:#fff;border:2px dashed #cbd5e1;border-radius:12px;text-align:center;cursor:pointer;color:#475569;font-weight:600;font-size:13px;transition:.2s}
.fl label:active{transform:scale(.98)}
.fl label:hover{border-color:#2563eb;color:#2563eb;background:#f0f9ff}
.suc{display:none;text-align:center;padding:18px 0}
.sic{width:70px;height:70px;margin:0 auto 18px;background:linear-gradient(135deg,#059669,#047857);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(5,150,105,.3);color:#fff;font-size:36px;font-weight:bold;animation:pop .5s cubic-bezier(.68,-.55,.27,1.55)}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.suc h2{font-size:24px;font-weight:800;margin-bottom:8px;color:#0f172a}
.suc>p{color:#64748b;font-size:14px;margin-bottom:20px}
.sd{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:1.5px solid #e2e8f0;border-radius:16px;padding:18px;margin:0 0 18px 0;text-align:left}
.sd .dr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.sd .dr:last-child{border-bottom:none}
.sd .dl{color:#64748b;font-weight:600}
.sd .dv{color:#0f172a;font-weight:700}
.abs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.abtn{padding:13px 10px;border:1.5px solid #e2e8f0;border-radius:14px;background:#fff;cursor:pointer;font-size:12px;font-weight:700;transition:.2s;font-family:inherit;color:#0f172a;box-shadow:0 2px 8px rgba(0,0,0,.03);display:flex;align-items:center;justify-content:center;gap:6px}
.abtn:active{transform:scale(.96)}
.abtn:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.1);transform:translateY(-1px)}
.abtn.wa{background:linear-gradient(135deg,#25D366,#20BA5C);color:#fff;border-color:#25D366;box-shadow:0 4px 12px rgba(37,211,102,.3)}
.abtn.wa:hover{box-shadow:0 6px 16px rgba(37,211,102,.4)}
.abtn svg{width:16px;height:16px;flex-shrink:0}
.ld{display:none;text-align:center;padding:35px 10px}
.sp{border:3px solid #e2e8f0;border-top:3px solid #2563eb;border-radius:50%;width:44px;height:44px;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.ad{font-size:32px;font-weight:800;color:#2563eb;margin:14px 0;letter-spacing:-1px}
.err{background:linear-gradient(135deg,#fef2f2,#fee2e2);color:#dc2626;padding:11px 13px;border-radius:10px;margin:12px 0;display:none;font-size:12px;border-left:3px solid #dc2626;font-weight:600;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.prog{margin-top:12px;text-align:left}
.prog-step{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px;color:#64748b}
.prog-step.active{color:#2563eb;font-weight:600}
.prog-step.done{color:#059669}
.prog-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;flex-shrink:0}
.prog-step.active .prog-dot{background:#2563eb;animation:pulse 1s infinite}
.prog-step.done .prog-dot{background:#059669}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:380px){.container{padding:22px 18px;border-radius:20px}.header h1{font-size:22px}.amts{grid-template-columns:repeat(2,1fr)}.ab.cust{grid-column:span 2}.abtn{font-size:11px;padding:11px 8px}}
</style>
</head>

<script>
const U='https://uegdizdnminwhkxcdcle.supabase.co',K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZ2RpemRubWlud2hreGNkY2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwODk2MjgsImV4cCI6MjA5NzY2NTYyOH0.2wiAHbaoNoDva_tRseDAywVMu_6AioCGlVLgoVb0d6s';
const sb=window.supabase.createClient(U,K);
let D={},F=null,I=null;

const tc=a=>Math.max(1,Math.floor(a/10));
const it=a=>{const t=tc(a);return t+' Tree'+(t===1?'':'s')+' Planted'};
const er=m=>{const e=document.getElementById('err');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',3000)};
const sel=(a,b)=>{document.querySelectorAll('.ab').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(a!=='c'){document.getElementById('amt').value=a}else{document.getElementById('amt').value='';setTimeout(()=>document.getElementById('amt').focus(),100)}};
const clr=()=>document.querySelectorAll('.ab').forEach(x=>x.classList.remove('on'));

// IMAGE COMPRESSION - 70-80% size reduction
function compressImage(file){
return new Promise((resolve)=>{
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');
const img=new Image();
img.onload=()=>{
let w=img.width,h=img.height;
const max=1200;
if(w>max||h>max){
if(w>h){h=Math.round(h*max/w);w=max}
else{w=Math.round(w*max/h);h=max}
}
canvas.width=w;canvas.height=h;
ctx.drawImage(img,0,0,w,h);
canvas.toBlob(blob=>resolve(blob),'image/jpeg',0.7);
};
img.src=URL.createObjectURL(file);
});
}

async function goQR(){
const n=document.getElementById('name').value.trim(),e=document.getElementById('email').value.trim(),a=document.getElementById('amt').value,m=document.getElementById('msg').value.trim();
if(!n||!e||!a){er('Fill all required fields');return}
if(a<10){er('Min Rs 10');return}
if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){er('Invalid email');return}
D={n,e,a:+a,m};
const b=document.querySelector('#fs .bp');b.disabled=true;b.textContent='Processing...';
try{
const{data,error}=await sb.from('donations').insert([{name:n,email:e,amount:a,message:m||null,screenshot_url:null,status:'qr_generated'}]).select();
b.disabled=false;b.textContent='Continue to Payment';
if(error)throw error;
I=data[0].id;
document.getElementById('fs').style.display='none';
document.getElementById('qs').style.display='block';
document.getElementById('da').textContent=a;
setTimeout(()=>document.querySelector('.fl').style.display='block',1200);
}catch(x){b.disabled=false;b.textContent='Continue to Payment';er('Error: '+x.message)}
}

function hf(){
const f=document.getElementById('ss').files[0];
if(f){
if(f.size>5*1024*1024){er('Max 5MB');return}
if(!f.type.startsWith('image/')){er('Images only');return}
F=f;
document.getElementById('fl').innerHTML='Uploaded: '+f.name;
document.getElementById('sb').style.display='flex';
}}

async function sub(){
if(!F){er('Upload screenshot');return}
document.getElementById('qs').style.display='none';
document.getElementById('ld').style.display='block';

try{
// Step 1: Compress
document.getElementById('p1').classList.add('active');
const compressed=await compressImage(F);
document.getElementById('p1').classList.remove('active');
document.getElementById('p1').classList.add('done');

// Step 2: Upload
document.getElementById('p2').classList.add('active');
const x=F.name.split('.').pop(),fn='d_'+Date.now()+'.'+x;
await sb.storage.from('donation-screenshots').upload(fn,compressed);
const{data:u}=sb.storage.from('donation-screenshots').getPublicUrl(fn);
document.getElementById('p2').classList.remove('active');
document.getElementById('p2').classList.add('done');

// Step 3: Verify
document.getElementById('p3').classList.add('active');
await sb.from('donations').update({screenshot_url:u.publicUrl,status:'pending'}).eq('id',I);
document.getElementById('p3').classList.remove('active');
document.getElementById('p3').classList.add('done');

setTimeout(()=>{
document.getElementById('ld').style.display='none';
document.getElementById('sc').style.display='block';
document.getElementById('sn').textContent=D.n;
document.getElementById('sa').textContent='Rs '+D.a;
document.getElementById('st').textContent=it(D.a);
document.getElementById('sd').textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
document.getElementById('si').textContent='#KES-'+I.toString().padStart(5,'0');
confetti({particleCount:100,spread:70,origin:{y:.6},colors:['#059669','#2563eb','#fbbf24']});
},500);
}catch(x){console.error(x);er('Try again');document.getElementById('ld').style.display='none';document.getElementById('qs').style.display='block'}
}

function sw(){const t='I donated Rs '+D.a+' to KES Updates! '+it(D.a)+'.';window.open('https://wa.me/?text='+encodeURIComponent(t+' '+location.href),'_blank')}
function si(){const t='I donated Rs '+D.a+' to KES Updates! '+it(D.a);if(navigator.share)navigator.share({title:'KES Updates',text:t,url:location.href});else{navigator.clipboard.writeText(t+' '+location.href);alert('Copied!')}}

function op(h){
const b=new Blob([h],{type:'text/html'}),u=URL.createObjectURL(b),w=window.open(u,'_blank');
if(w)w.onload=()=>setTimeout(()=>w.print(),600);
else alert('Allow popups in browser!');
}

function dc(){
const t=tc(D.a),id='KES-CERT-'+I.toString().padStart(5,'0'),d=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
const h=`<!DOCTYPE html><html><head><title>Certificate - KES Updates</title><style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap');
@page{size:A4 landscape;margin:0}

.cf{display:flex;justify-content:space-between;padding-top:16px;border-top:1px solid #e2e8f0;margin-top:auto}
